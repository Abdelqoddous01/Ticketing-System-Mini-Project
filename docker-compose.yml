services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-ticketing-sys}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_NAME: ${DB_NAME:-project}
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      DB_HOST: db
      DB_PORT: 5432
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL:-admin@paylik.local}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-Admin@12345}
      INIT_AGENT_EMAIL: ${INIT_AGENT_EMAIL:-agent@paylik.local}
      INIT_AGENT_PASSWORD: ${INIT_AGENT_PASSWORD:-Agent@12345}
      INIT_CUSTOMER_EMAIL: ${INIT_CUSTOMER_EMAIL:-customer@paylik.local}
      INIT_CUSTOMER_PASSWORD: ${INIT_CUSTOMER_PASSWORD:-Customer@12345}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-project}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-project}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
